<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Workout Calendar v2</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#4a90e2">
</head>

<body>

<header class="header">

    <h1>
        💪 Workout Calendar
    </h1>

    <div class="user-panel">

        <span id="userName">
            로그인 안됨
        </span>

        <button id="loginBtn">
            Google 로그인
        </button>

        <button id="logoutBtn" class="hidden">
            로그아웃
        </button>

    </div>

</header>


<main>

<section class="calendar-card">

    <div class="calendar-header">

        <button id="prevMonth">
            ◀
        </button>

        <h2 id="currentMonth">
            2026년 7월
        </h2>

        <button id="nextMonth">
            ▶
        </button>

    </div>

    <div id="calendarGrid"
         class="calendar-grid">

    </div>

</section>


<section class="record-card">

    <h3 id="selectedDate">
        날짜 선택
    </h3>

    <div class="buttons">

        <button data-type="A">
            🔴 A
        </button>

        <button data-type="B">
            🟢 B
        </button>

        <button data-type="Run">
            🟡 Run
        </button>

        <button data-type="Rest">
            ⚪ Rest
        </button>

    </div>


    <div id="runBox" class="hidden">

        <input
                type="number"
                id="runDistance"
                step="0.1"
                placeholder="거리(km)">

        <button id="saveRun">
            저장
        </button>

    </div>


    <div class="etc-area">

        <input
                id="etcInput"
                placeholder="기타 운동">

        <button id="saveEtc">
            추가
        </button>

    </div>

    <div id="badgeArea">

    </div>

</section>


<section class="stats-card">

    <h3>
        📊 운동 통계
    </h3>

    <p id="monthStats">
        이번 달 : 0%
    </p>

    <p id="yearStats">
        올해 : 0%
    </p>

</section>


<section class="ai-card">

    <div class="title">

        🤖 AI Coach

        <button id="refreshAI">
            분석
        </button>

    </div>

    <pre id="aiResult">
AI 분석 결과가 표시됩니다.
    </pre>

</section>


<section class="routine-card">

    <h2>
        내 루틴
    </h2>

    <div>

        <h3>
            🔴 A
        </h3>

        <p id="guideA">

        </p>

    </div>

    <div>

        <h3>
            🟢 B
        </h3>

        <p id="guideB">

        </p>

    </div>

</section>

</main>


<script type="module" src="js/app.js"></script>

</body>
</html>
